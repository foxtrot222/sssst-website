name: Convert Images to WebP

# 1. TRIGGER: Only run when images in the 'images' folder are pushed
on:
  push:
    branches:
      - main
    paths:
      - 'images/**.jpg'
      - 'images/**.jpeg'
      - 'images/**.png'

permissions:
  contents: write

jobs:
  convert-to-webp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Install WebP utilities
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Convert PNG and JPG to WebP
        run: |
          # 2. SCRIPT: Search only inside the 'images' folder
          # We also check if the directory exists first to prevent errors if the folder is missing
          if [ -d "./images" ]; then
            find ./images -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) -exec sh -c '
              for img do
                webp_img="${img%.*}.webp"
                
                if [ ! -f "$webp_img" ]; then
                  echo "Converting $img to $webp_img"
                  cwebp -q 80 "$img" -o "$webp_img"
                fi
              done
            ' sh {} +
          else
            echo "The 'images' folder does not exist yet."
          fi

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-convert images to WebP [skip ci]"
          # No file_pattern needed; it will just commit the newly generated WebP files
